# AniCat Curated Performance Shaders Keybindings
# ctrl+1 -> Standard Quality (Neural Upscaling Enabled)
# ctrl+0 -> Battery Saver Mode (Disables all shaders to save maximum battery power)

# --- ctrl+1: STANDARD QUALITY (Neural Upscaling Enabled) ---
ctrl+1 no-osd change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl"; show-text "AniCat Preset: Standard Quality (Neural Upscaling Enabled)"

# --- ctrl+0: BATTERY SAVER MODE (Upscaling Off) ---
ctrl+0 no-osd set glsl-shaders ""; show-text "AniCat Preset: Battery Saver Mode (Upscaling Off)"
