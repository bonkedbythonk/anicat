# Display style of current position. available: line, bar
timeline_style=line
# Line display style config
timeline_line_width=3
# Timeline size when fully expanded, in pixels, 0 to disable
timeline_size=12
# Comma separated states when element should always be fully visible.
# Available: paused, audio, image, video, idle, windowed, fullscreen
timeline_persistency=paused
# Top border of background color to help visually separate timeline from video
timeline_border=0
# When scrolling above timeline, wheel will seek by this amount of seconds.
# Default uses fast seeking. Add `!` suffix to enable exact seeks. Example: `5!`
timeline_step=5
# Render cache indicators for streaming content
timeline_cache=yes
# Render heatmap for youtube videos. Available: overlay, above, no
timeline_heatmap=overlay

# When to display an always visible progress bar (minimized timeline). Can be: windowed, fullscreen, always, never
# Can also be toggled on demand with `toggle-progress` command.
progress=windowed
progress_size=2
progress_line_width=20

# Custom Elements Layout (Replicates Web Controls Bar groups perfectly)
# Left: Hamburger menu, CC Subtitles, Audio track selector
# Space: Dynamically pushes everything to align groups
# Center: Previous episode (<), Items/Episode list (List icon), Next episode (>)
# Space: Dynamically pushes everything to align groups
# Right: Speed selector dial, Fullscreen toggle
controls=menu,subtitles,audio,space,prev,items,next,space,speed,fullscreen
controls_size=28
controls_margin=18
controls_spacing=6
controls_persistency=

# Where to display volume controls: none, left, right
volume=right
volume_size=32
volume_border=0
volume_step=1
volume_persistency=

# Playback speed widget: mouse drag or wheel to change, click to reset
speed_step=0.1
speed_step_is_factor=no
speed_persistency=

# Controls all menus, such as context menu, subtitle loader/selector, etc
menu_item_height=36
menu_min_width=260
menu_padding=4
# Determines if `/` or `ctrl+f` is required to activate the search, or if typing
# any text is sufficient.
menu_type_to_search=yes

# Top bar with window controls and media title
top_bar=no-border
top_bar_size=40
top_bar_controls=right
top_bar_title=yes
top_bar_alt_title_place=below
top_bar_flash_on=video,audio
top_bar_persistency=

# Window border drawn in no-border mode
window_border_size=1

# Disable automatic loading to keep player fully clean
autoload=no
shuffle=no

# Scale coordinates and layouts
scale=1
scale_fullscreen=1.3
font_scale=1
text_border=1.2

# Borders and Corner Radii
border_radius=8

# AniCat Custom Colors & Transparency Arrays
# Injects signature AniCat Cyan (#00f2fe) for timelines, selections, and indicators.
# Sets background controls opacity (controls=0) to fully transparent so buttons float individually.
color=foreground=00f2fe,foreground_text=0d0e12,background=0d0e12,background_text=ffffff,match=00f2fe,heatmap=00f2fe
opacity=timeline=0.7,position=0.9,chapters=0.6,slider=0.8,slider_gauge=0.9,controls=0,speed=0.6,menu=0.95,submenu=0.5,border=0.3,title=0.8,tooltip=0.9
refine=
animation_duration=100
flash_duration=1000
proximity_in=40
proximity_out=120
font_bold=no
destination_time=playtime-remaining
time_precision=0
buffered_time_threshold=60
autohide=no
pause_indicator=flash
stream_quality_options=4320,2160,1440,1080,720,480,360,240,144
video_types=3g2,3gp,asf,avi,f4v,flv,h264,h265,m2ts,m4v,mkv,mov,mp4,mp4v,mpeg,mpg,ogm,ogv,rm,rmvb,ts,vob,webm,wmv,y4m
audio_types=aac,ac3,aiff,ape,au,cue,dsf,dts,flac,m4a,mid,midi,mka,mp3,mp4a,oga,ogg,opus,spx,tak,tta,wav,weba,wma,wv
image_types=apng,avif,bmp,gif,j2k,jp2,jfif,jpeg,jpg,jxl,mj2,png,svg,tga,tif,tiff,webp
subtitle_types=aqt,ass,gsub,idx,jss,lrc,mks,pgs,pjs,psb,rt,sbv,slt,smi,sub,sup,srt,ssa,ssf,ttxt,txt,usf,vt,vtt
playlist_types=m3u,m3u8,pls,url,cue
load_types=video,audio,image
default_directory=~/
